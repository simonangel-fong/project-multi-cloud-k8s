apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana-k8s-monitoring
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  # generator: select cluster with label
  generators:
    - clusters:
        selector:
          matchLabels:
            workload: demo-api
  template:
    metadata:
      name: '{{ .name }}-04-grafana-k8s-monitoring'
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      finalizers:
        - resources-finalizer.argoproj.io/finalizer
    spec:
      project: default
      revisionHistoryLimit: 3
      # source: helm + values
      sources:
        - repoURL: https://github.com/simonangel-fong/k8s-multi-cloud.git
          targetRevision: master
          ref: values
        - repoURL: https://grafana.github.io/helm-charts
          chart: k8s-monitoring
          targetRevision: 4.1.6
          helm:
            releaseName: grafana-k8s-monitoring
            valueFiles:
              - $values/helm/k8s-monitoring/values-{{ index .metadata.labels "cloud" }}.yaml
      # destination: selected cluster server
      destination:
        server: '{{ .server }}'
        namespace: monitoring
      ignoreDifferences:
        - group: apps
          kind: DaemonSet
          jsonPointers:
            - /spec/template/metadata/annotations
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m
            factor: 2
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
